name: FlowState
options:
  bundleIdPrefix: com.darshshah
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.darshshah.FlowState
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: FlowState
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSMicrophoneUsageDescription: FlowState needs microphone access for push-to-talk dictation.
packages:
  whisper:
    path: Vendor/whisper.spm

targets:
  FlowState:
    type: application
    platform: macOS
    sources:
      - path: FlowState
    dependencies:
      - package: whisper
        product: whisper
    settings:
      base:
        PRODUCT_NAME: FlowState
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - FlowStateTests
  FlowStateTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FlowStateTests
    dependencies:
      - target: FlowState
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
