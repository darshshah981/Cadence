name: Cadence
options:
  bundleIdPrefix: com.darshshah
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.darshshah.Cadence
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Cadence
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSMicrophoneUsageDescription: Cadence needs microphone access for push-to-talk dictation.
packages:
  argmax-oss-swift:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: 0.18.0

targets:
  Cadence:
    type: application
    platform: macOS
    sources:
      - path: Cadence
    dependencies:
      - package: argmax-oss-swift
        product: WhisperKit
    settings:
      base:
        PRODUCT_NAME: Cadence
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development: darsh.shah@icloud.com (7FKP4PLNZ3)"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: P3MT7UXJ5N
          PRODUCT_NAME: Cadence Debug
          PRODUCT_MODULE_NAME: Cadence
          PRODUCT_BUNDLE_IDENTIFIER: com.darshshah.Cadence.debug
          INFOPLIST_KEY_CFBundleDisplayName: Cadence Debug
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.darshshah.Cadence
          INFOPLIST_KEY_CFBundleDisplayName: Cadence
    scheme:
      testTargets:
        - CadenceTests
  CadenceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CadenceTests
    dependencies:
      - target: Cadence
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          TEST_HOST: $(BUILT_PRODUCTS_DIR)/Cadence Debug.app/Contents/MacOS/Cadence Debug
        Release:
          TEST_HOST: $(BUILT_PRODUCTS_DIR)/Cadence.app/Contents/MacOS/Cadence
